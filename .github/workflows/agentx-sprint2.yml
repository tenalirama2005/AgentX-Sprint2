# .github/workflows/agentx-sprint2.yml
# CI: build + test + publish to GHCR on push to main

name: AgentX-Sprint2 CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: tenalirama2026/agentx-sprint2

jobs:
  # ── 1. Build & Test ──────────────────────────────────────────
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Format check
        run: cargo fmt --check

      - name: Build release
        run: cargo build --release --locked

      - name: Run tests
        env:
          GATEWAY_JWT_SECRET: test-secret-for-ci
          FBA_ENDPOINT: http://localhost:8081
          AGENT_URL: http://localhost:8090
        run: cargo test --release

  # ── 2. Docker Build & Publish ───────────────────────────────
  docker-publish:
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: tenalirama2026
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64      # Required for AgentBeats GitHub Actions
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image URL
        run: |
          echo "✅ Image published:"
          echo "   ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo "   ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"

  # ── 3. AgentBeats Health Check ──────────────────────────────
  verify-agent-card:
    needs: docker-publish
    runs-on: ubuntu-latest
    steps:
      - name: Start agent and verify card
        env:
          GATEWAY_JWT_SECRET: ${{ secrets.GATEWAY_JWT_SECRET }}
        run: |
          docker run -d \
            -p 8090:8090 \
            -e GATEWAY_JWT_SECRET=$GATEWAY_JWT_SECRET \
            -e FBA_ENDPOINT=http://host.docker.internal:8081 \
            -e AGENT_URL=http://localhost:8090 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

          sleep 5

          # Verify agent card endpoint
          curl -f http://localhost:8090/.well-known/agent.json | jq .name
          curl -f http://localhost:8090/health | jq .status

          echo "✅ Agent card verified"
